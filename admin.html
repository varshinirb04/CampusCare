<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCare Admin Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-sky-50 via-emerald-50 to-amber-50 font-sans text-[#14213d]">

<header class="sticky top-0 z-50 border-b border-white/70 bg-white/75 backdrop-blur-xl">
  <nav class="mx-auto flex max-w-7xl items-center justify-between px-5 py-4">
    <a href="index.html" class="flex items-center gap-3">
      <span class="grid h-11 w-11 place-items-center rounded-2xl bg-[#14213d] text-xl text-white">A</span>
      <span>
        <span class="block text-xl font-black">Admin Dashboard</span>
        <span class="block text-xs font-semibold uppercase text-slate-500">CampusCare</span>
      </span>
    </a>

    <button onclick="logout()" class="rounded-full bg-[#14213d] px-5 py-2.5 text-sm font-bold text-white">
      Logout
    </button>
  </nav>
</header>

<main class="mx-auto max-w-7xl px-5 py-12">
  <section class="rounded-[2rem] bg-white/80 p-8 shadow-xl">
    <h1 class="text-4xl font-black">Admin Complaint Management</h1>
    <p class="mt-3 text-slate-600">
      Admin can view all student complaints and update their status.
    </p>
  </section>

  <section class="mt-6 rounded-3xl bg-white p-6 shadow-sm">
    <h2 class="text-2xl font-black">All Complaints</h2>
    <div id="adminComplaintList" class="mt-5 grid gap-4"></div>
  </section>
</main>

<script src="js/script.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
